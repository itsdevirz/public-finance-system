name: Telegram Notify

on:
  push:
  pull_request:
    types: [opened, closed, reopened, synchronize]
  issues:
    types: [opened, closed, reopened]
  release:
    types: [published]
  fork:
  watch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Get current time
        id: time
        run: |
          echo "DATETIME=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "DATE=$(date +'%Y/%m/%d')" >> $GITHUB_OUTPUT
          echo "TIME=$(date +'%H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Build message
        id: msg
        run: |
          EVENT="${{ github.event_name }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          BRANCH="${GITHUB_REF#refs/heads/}"
          BEFORE="${{ github.event.before }}"
          DATETIME="${{ steps.time.outputs.DATETIME }}"
          DATE="${{ steps.time.outputs.DATE }}"
          TIME="${{ steps.time.outputs.TIME }}"
          REPO_URL="https://github.com/$REPO"
          ACTOR_URL="https://github.com/$ACTOR"
          TEXT=""
          BUTTON=""
          
          if [ "$EVENT" = "push" ]; then
            # تشخیص برنچ جدید
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              TEXT="🌿 *New Branch Created*\n\n"
              TEXT+="📦 *Repository:* [$REPO]($REPO_URL)\n"
              TEXT+="🌱 *Branch:* \`$BRANCH\`\n"
              TEXT+="👤 *Creator:* [$ACTOR]($ACTOR_URL)\n"
              TEXT+="📅 *Date:* $DATE\n"
              TEXT+="⏰ *Time:* $TIME"
              BUTTON="{\"inline_keyboard\":[[{\"text\":\"🔗 View Branch\",\"url\":\"$REPO_URL/tree/$BRANCH\"}]]}"
            else
              COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -c 300)
              COMMIT_URL="${{ github.event.head_commit.url }}"
              COMMIT_ID=$(echo "${{ github.event.head_commit.id }}" | cut -c1-7)
              URL="${{ github.event.compare }}"
              ADDITIONS="${{ github.event.head_commit.additions }}"
              DELETIONS="${{ github.event.head_commit.deletions }}"
              TOTAL_CHANGES=$((ADDITIONS + DELETIONS))
              
              TEXT="🚀 *New Push Detected*\n\n"
              TEXT+="📦 *Repository:* [$REPO]($REPO_URL)\n"
              TEXT+="🌿 *Branch:* \`$BRANCH\`\n"
              TEXT+="👤 *Author:* [$ACTOR]($ACTOR_URL)\n"
              TEXT+="📝 *Commit:* [$COMMIT_ID]($COMMIT_URL)\n"
              TEXT+="📅 *Date:* $DATE\n"
              TEXT+="⏰ *Time:* $TIME\n\n"
              TEXT+="📌 *Message:*\n$COMMIT_MSG\n\n"
              TEXT+="📊 *Changes:* +$ADDITIONS/-$DELETIONS (Total: $TOTAL_CHANGES)"
              BUTTON="{\"inline_keyboard\":[[{\"text\":\"🔍 View Changes\",\"url\":\"$URL\"}]]}"
            fi
            
          elif [ "$EVENT" = "pull_request" ]; then
            TITLE="${{ github.event.pull_request.title }}"
            URL="${{ github.event.pull_request.html_url }}"
            ACTION="${{ github.event.action }}"
            PR_NUMBER="${{ github.event.pull_request.number }}"
            
            if [ "$ACTION" = "opened" ]; then
              EMOJI="🆕"
              ACTION_TEXT="Opened"
            elif [ "$ACTION" = "closed" ]; then
              if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
                EMOJI="✅"
                ACTION_TEXT="Merged"
              else
                EMOJI="❌"
                ACTION_TEXT="Closed"
              fi
            elif [ "$ACTION" = "reopened" ]; then
              EMOJI="🔄"
              ACTION_TEXT="Reopened"
            elif [ "$ACTION" = "synchronize" ]; then
              EMOJI="🔄"
              ACTION_TEXT="Updated"
            else
              EMOJI="🔀"
              ACTION_TEXT="$ACTION"
            fi
            
            TEXT="$EMOJI *Pull Request #$PR_NUMBER ($ACTION_TEXT)*\n\n"
            TEXT+="📦 *Repository:* [$REPO]($REPO_URL)\n"
            TEXT+="👤 *Author:* [$ACTOR]($ACTOR_URL)\n"
            TEXT+="📌 *Title:* $TITLE\n"
            TEXT+="📅 *Date:* $DATE\n"
            TEXT+="⏰ *Time:* $TIME"
            BUTTON="{\"inline_keyboard\":[[{\"text\":\"🔗 View PR\",\"url\":\"$URL\"}]]}"
            
          elif [ "$EVENT" = "issues" ]; then
            TITLE="${{ github.event.issue.title }}"
            URL="${{ github.event.issue.html_url }}"
            ACTION="${{ github.event.action }}"
            ISSUE_NUMBER="${{ github.event.issue.number }}"
            
            if [ "$ACTION" = "opened" ]; then
              EMOJI="🆕"
              ACTION_TEXT="Opened"
            elif [ "$ACTION" = "closed" ]; then
              EMOJI="✅"
              ACTION_TEXT="Closed"
            elif [ "$ACTION" = "reopened" ]; then
              EMOJI="🔄"
              ACTION_TEXT="Reopened"
            else
              EMOJI="🐞"
              ACTION_TEXT="$ACTION"
            fi
            
            TEXT="$EMOJI *Issue #$ISSUE_NUMBER ($ACTION_TEXT)*\n\n"
            TEXT+="📦 *Repository:* [$REPO]($REPO_URL)\n"
            TEXT+="👤 *Author:* [$ACTOR]($ACTOR_URL)\n"
            TEXT+="📌 *Title:* $TITLE\n"
            TEXT+="📅 *Date:* $DATE\n"
            TEXT+="⏰ *Time:* $TIME"
            BUTTON="{\"inline_keyboard\":[[{\"text\":\"🔗 View Issue\",\"url\":\"$URL\"}]]}"
            
          elif [ "$EVENT" = "release" ]; then
            NAME="${{ github.event.release.name }}"
            URL="${{ github.event.release.html_url }}"
            TAG="${{ github.event.release.tag_name }}"
            PRERELEASE="${{ github.event.release.prerelease }}"
            
            if [ "$PRERELEASE" = "true" ]; then
              EMOJI="🧪"
              STATUS="Pre-release"
            else
              EMOJI="🏷️"
              STATUS="Stable"
            fi
            
            TEXT="$EMOJI *New Release ($STATUS)*\n\n"
            TEXT+="📦 *Repository:* [$REPO]($REPO_URL)\n"
            TEXT+="🏷️ *Tag:* \`$TAG\`\n"
            TEXT+="📌 *Name:* $NAME\n"
            TEXT+="👤 *Author:* [$ACTOR]($ACTOR_URL)\n"
            TEXT+="📅 *Date:* $DATE\n"
            TEXT+="⏰ *Time:* $TIME"
            BUTTON="{\"inline_keyboard\":[[{\"text\":\"📥 View Release\",\"url\":\"$URL\"}]]}"
            
          elif [ "$EVENT" = "fork" ]; then
            FORK_REPO="${{ github.event.forkee.full_name }}"
            FORK_URL="${{ github.event.forkee.html_url }}"
            
            TEXT="🍴 *Repository Forked*\n\n"
            TEXT+="📦 *Original:* [$REPO]($REPO_URL)\n"
            TEXT+="🍴 *Fork:* [$FORK_REPO]($FORK_URL)\n"
            TEXT+="👤 *By:* [$ACTOR]($ACTOR_URL)\n"
            TEXT+="📅 *Date:* $DATE\n"
            TEXT+="⏰ *Time:* $TIME"
            BUTTON="{\"inline_keyboard\":[[{\"text\":\"🔗 View Fork\",\"url\":\"$FORK_URL\"}]]}"
            
          elif [ "$EVENT" = "watch" ]; then
            TEXT="⭐ *New Star*\n\n"
            TEXT+="📦 *Repository:* [$REPO]($REPO_URL)\n"
            TEXT+="👤 *By:* [$ACTOR]($ACTOR_URL)\n"
            TEXT+="📅 *Date:* $DATE\n"
            TEXT+="⏰ *Time:* $TIME"
            BUTTON="{\"inline_keyboard\":[[{\"text\":\"⭐ View Repository\",\"url\":\"$REPO_URL\"}]]}"
            
          else
            TEXT="📢 *Event: $EVENT*\n\n"
            TEXT+="📦 *Repository:* [$REPO]($REPO_URL)\n"
            TEXT+="👤 *By:* [$ACTOR]($ACTOR_URL)\n"
            TEXT+="📅 *Date:* $DATE\n"
            TEXT+="⏰ *Time:* $TIME"
            BUTTON="{\"inline_keyboard\":[[{\"text\":\"🔗 View Repository\",\"url\":\"$REPO_URL\"}]]}"
          fi
          
          {
            echo 'TEXT<<EOF'
            echo -e "$TEXT"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          
          echo "BUTTON=$BUTTON" >> "$GITHUB_OUTPUT"

      - name: Send to Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          if [ -z "$BOT_TOKEN" ]; then
            echo "❌ BOT_TOKEN is not set!"
            exit 1
          fi
          if [ -z "$CHAT_ID" ]; then
            echo "❌ CHAT_ID is not set!"
            exit 1
          fi
          
          # ارسال پیام با دکمه شیشه‌ای
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${{ steps.msg.outputs.TEXT }}" \
            -d parse_mode=Markdown \
            -d reply_markup='${{ steps.msg.outputs.BUTTON }}')
          
          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "✅ Message sent successfully!"
          else
            echo "❌ Failed to send message: $RESPONSE"
            exit 1
          fi
